name: Update Progress Tracker

# Runs whenever a tracker checkbox file changes, or manually via the Actions tab.
# Recomputes PROGRESS.md and badges/*.json from the current [x]/[ ] state and
# commits the result back. Paths are scoped to tracker/**, and this job only
# ever touches PROGRESS.md + badges/, so it can never trigger itself in a loop.

on:
  push:
    paths:
      - "tracker/**/*.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate progress report + badges
        run: python3 scripts/generate_progress.py

      - name: Commit updated progress
        run: |
          git config user.name "progress-bot"
          git config user.email "actions@users.noreply.github.com"
          git add PROGRESS.md badges/
          git diff --staged --quiet || git commit -m "chore: update progress tracker"
          git push
